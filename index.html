<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>영단어 마스터 — 수능 · 토익 · 공무원 · 내신</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
  /* ---------- design tokens (Open Color palette) ---------- */
  :root {
    --bg: #FAF7F2;
    --bg-soft: #F5F0E8;
    --card: #FFFFFF;
    --line: #E9E2D5;
    --text: #212529;
    --muted: #495057;
    --dim: #868E96;
    --brand: #E67700;   /* oc-orange-9 */
    --brand-soft: #FFD8A8; /* oc-orange-2 */
    --accent: #1864AB;  /* oc-blue-9 */
    --accent-soft: #D0EBFF; /* oc-blue-1 */
    --ok: #2F9E44;      /* oc-green-8 */
    --ok-soft: #D3F9D8; /* oc-green-1 */
    --bad: #E03131;     /* oc-red-8 */
    --bad-soft: #FFE3E3;
    --known: #5C940D;   /* oc-lime-9 */
    --known-soft: #E9FAC8;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(33,37,41,.06);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.06), 0 24px 48px rgba(33,37,41,.10);
    --radius: 12px;
    --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root.auto {
      --bg: #28251F;
      --bg-soft: #322E27;
      --card: #3A362E;
      --line: #524C42;
      --text: #F5EFDF;
      --muted: #DACDB0;
      --dim: #A89D85;
      --brand: #FFB870;
      --brand-soft: #5C3A12;
      --accent: #8AC8FF;
      --accent-soft: #1F4F80;
      --ok: #7CE39F;
      --ok-soft: #1F4F2A;
      --bad: #FF9D9D;
      --bad-soft: #6B2424;
      --known: #C8E875;
      --known-soft: #3A5018;
    }
  }

  /* ---------- per-category color themes (Open Color) ---------- */
  body.cat-suneung   { --brand: #4263EB; --brand-soft: #DBE4FF; --cat-accent: #364FC7; }
  body.cat-toeic     { --brand: #E67700; --brand-soft: #FFD8A8; --cat-accent: #D9480F; }
  body.cat-gongmuwon { --brand: #862E9C; --brand-soft: #F3D9FA; --cat-accent: #5F3DC4; }
  body.cat-naesin    { --brand: #099268; --brand-soft: #C3FAE8; --cat-accent: #087F5B; }
  :root.auto body.cat-suneung,
  :root.auto body.cat-toeic,
  :root.auto body.cat-gongmuwon,
  :root.auto body.cat-naesin { --brand-soft: rgba(255,255,255,.08); }

  body { transition: background-color .3s ease; }
  .card, .flashcard, .quiz-card, .tab-group button, .chip, .btn, h1.brand .dot {
    transition: background-color .2s, border-color .2s, color .2s, box-shadow .2s;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  code, .mono { font-family: var(--mono); }

  /* ---------- header ---------- */
  header.app-head {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(6px);
  }
  .head-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .title-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  h1.brand {
    font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 8px;
  }
  h1.brand .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--brand);
  }
  .progress-mini {
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted);
  }
  .progress-mini .bar {
    width: 140px; height: 6px; background: var(--bg-soft); border-radius: 99px; overflow: hidden;
    border: 1px solid var(--line);
  }
  .progress-mini .bar > span {
    display: block; height: 100%; background: var(--brand); transition: width .3s ease;
  }
  .progress-mini .num { font-family: var(--mono); font-size: 12px; }

  /* ---------- nav tabs ---------- */
  .nav-row {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
  }
  .tab-group {
    display: inline-flex; background: var(--bg-soft); padding: 3px; border-radius: 10px;
    border: 1px solid var(--line);
  }
  .tab-group button {
    border: 0; background: transparent; color: var(--muted);
    padding: 6px 12px; font: inherit; font-size: 13px; font-weight: 500;
    border-radius: 7px; cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab-group button:hover { color: var(--text); }
  .tab-group button.active {
    background: var(--card); color: var(--text); box-shadow: var(--shadow);
  }
  .tab-group button .count {
    font-family: var(--mono); font-size: 11px; opacity: .7;
    background: var(--line); padding: 1px 6px; border-radius: 99px;
  }
  .tab-group button.active .count { background: var(--brand-soft); color: var(--brand); opacity: 1; }

  .search-wrap {
    margin-left: auto; position: relative; flex: 1; min-width: 200px; max-width: 320px;
  }
  .search-wrap input {
    width: 100%; padding: 8px 12px 8px 32px; font: inherit; font-size: 13px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); outline: none;
  }
  .search-wrap input:focus { border-color: var(--brand); }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 12px; opacity: .5;
  }

  .icon-btn {
    border: 1px solid var(--line); background: var(--card); color: var(--text);
    width: 34px; height: 34px; border-radius: 9px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .icon-btn:hover { background: var(--bg-soft); }

  /* ---------- main ---------- */
  main {
    max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px;
  }

  /* ---------- list view ---------- */
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; transition: all .15s; position: relative;
    box-shadow: var(--shadow);
  }
  .card.known { background: var(--known-soft); border-color: var(--known); }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  }
  .card .en {
    font-family: var(--mono); font-weight: 600; font-size: 17px; color: var(--text);
    word-break: break-word;
  }
  .card .ko { color: var(--accent); font-weight: 500; font-size: 14px; margin-top: 4px; }
  .card .ex {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 13px; color: var(--muted);
  }
  .card .ex .en { font-family: var(--mono); font-size: 13px; font-weight: 400; font-style: italic; color: var(--text); }
  .card .ex .ko { font-size: 13px; color: var(--dim); margin-top: 2px; font-weight: 400; }
  .card-tools {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .chip {
    border: 1px solid var(--line); background: var(--bg-soft); color: var(--muted);
    padding: 4px 10px; font-size: 11px; border-radius: 99px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--sans); font-weight: 500;
  }
  .chip:hover { background: var(--card); color: var(--text); }
  .chip.active { background: var(--known-soft); border-color: var(--known); color: var(--known); }
  .chip.speak { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .chip.speak:hover { background: var(--accent); color: white; }
  .card-num {
    position: absolute; top: 8px; right: 12px;
    font-family: var(--mono); font-size: 10px; color: var(--dim);
  }

  /* ---------- flashcard view ---------- */
  .flash-wrap {
    max-width: 640px; margin: 0 auto; text-align: center;
  }
  .flash-meta {
    font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 12px;
  }
  .flashcard {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 48px 32px; min-height: 320px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    cursor: pointer; user-select: none; position: relative;
    transition: transform .15s;
  }
  .flashcard:hover { transform: translateY(-2px); }
  .flashcard.known { border-color: var(--known); background: var(--known-soft); }
  .flashcard .english {
    font-family: var(--mono); font-size: 36px; font-weight: 600; color: var(--text);
    margin-bottom: 8px; word-break: break-word; text-align: center;
  }
  .flashcard .hint { font-size: 12px; color: var(--dim); margin-top: 16px; }
  .flashcard .korean {
    color: var(--accent); font-size: 22px; font-weight: 600; margin-top: 12px;
  }
  .flashcard .example {
    margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--line);
    font-size: 15px; color: var(--muted); width: 100%;
  }
  .flashcard .example .en { font-family: var(--mono); font-style: italic; color: var(--text); display: block; }
  .flashcard .example .ko { color: var(--dim); display: block; margin-top: 4px; font-size: 14px; }

  .flash-controls {
    display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;
  }
  .btn {
    border: 1px solid var(--line); background: var(--card); color: var(--text);
    padding: 8px 16px; font: inherit; font-size: 13px; font-weight: 500;
    border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-soft); }
  .btn.primary { background: var(--brand); color: white; border-color: var(--brand); }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ok { background: var(--known); color: white; border-color: var(--known); }
  .btn.bad { background: var(--bad); color: white; border-color: var(--bad); }
  .btn.ghost { background: transparent; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .flash-progress {
    height: 4px; background: var(--bg-soft); border-radius: 99px; margin: 16px 0 4px; overflow: hidden;
  }
  .flash-progress > span { display: block; height: 100%; background: var(--brand); transition: width .3s; }

  /* ---------- quiz view ---------- */
  .quiz-wrap { max-width: 720px; margin: 0 auto; }
  .quiz-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 32px 28px; box-shadow: var(--shadow-lg);
  }
  .quiz-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted); margin-bottom: 16px;
  }
  .quiz-meta .score { font-family: var(--mono); }
  .quiz-q {
    text-align: center; padding: 32px 0;
  }
  .quiz-q .en {
    font-family: var(--mono); font-size: 32px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .quiz-q .prompt { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
  .quiz-choices {
    display: grid; gap: 10px; margin-top: 20px;
  }
  .quiz-choice {
    text-align: left; padding: 14px 18px; border: 1px solid var(--line); background: var(--card);
    border-radius: 10px; cursor: pointer; font: inherit; font-size: 15px; color: var(--text);
    transition: all .15s; display: flex; align-items: center; gap: 10px;
  }
  .quiz-choice:hover:not(:disabled) { background: var(--bg-soft); border-color: var(--accent); }
  .quiz-choice .key {
    width: 22px; height: 22px; border-radius: 50%; background: var(--bg-soft); border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; flex-shrink: 0; font-weight: 600;
  }
  .quiz-choice.correct { background: var(--ok-soft); border-color: var(--ok); color: var(--ok); }
  .quiz-choice.correct .key { background: var(--ok); color: white; }
  .quiz-choice.wrong { background: var(--bad-soft); border-color: var(--bad); color: var(--bad); }
  .quiz-choice.wrong .key { background: var(--bad); color: white; }
  .quiz-choice:disabled { cursor: default; }

  .quiz-feedback {
    margin-top: 20px; padding: 14px; border-radius: 10px;
    background: var(--bg-soft); border: 1px solid var(--line);
    text-align: center; font-size: 14px;
  }
  .quiz-result {
    text-align: center; padding: 40px 20px;
  }
  .quiz-result .score-big {
    font-family: var(--mono); font-size: 64px; font-weight: 600; color: var(--brand);
    line-height: 1;
  }
  .quiz-result .label { color: var(--muted); margin-top: 8px; }
  .quiz-review {
    margin-top: 32px; text-align: left;
  }
  .quiz-review h3 {
    font-size: 14px; color: var(--muted); margin: 0 0 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
  }
  .review-item {
    padding: 10px 0; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; gap: 12px; align-items: baseline;
    font-size: 14px;
  }
  .review-item:last-child { border-bottom: 0; }
  .review-item .en { font-family: var(--mono); font-weight: 500; }
  .review-item .ko { color: var(--accent); font-size: 13px; }
  .review-item .wrong-mark { color: var(--bad); font-family: var(--mono); font-size: 12px; }

  /* ---------- SRS (spaced repetition) ---------- */
  .srs-wrap { max-width: 720px; margin: 0 auto; }
  .srs-start { text-align: center; padding: 20px 0 0; }
  .srs-start h2 {
    font-size: 22px; margin: 0 0 8px; font-weight: 700; letter-spacing: -.01em;
  }
  .srs-start .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .srs-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin: 20px 0;
  }
  .srs-stats .stat {
    background: var(--card); border: 1px solid var(--line);
    padding: 18px 12px; border-radius: 12px; text-align: center;
    box-shadow: var(--shadow);
  }
  .srs-stats .stat .num {
    font-family: var(--mono); font-size: 32px; font-weight: 600; line-height: 1;
  }
  .srs-stats .stat.due .num  { color: var(--brand); }
  .srs-stats .stat.new .num  { color: var(--accent); }
  .srs-stats .stat.done .num { color: var(--ok); }
  .srs-stats .stat .label { font-size: 11px; color: var(--muted); margin-top: 8px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }

  .srs-dist {
    background: var(--bg-soft); border: 1px solid var(--line);
    padding: 14px 16px; border-radius: 10px; margin-top: 16px;
  }
  .srs-dist .dist-title { font-size: 11px; color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .srs-dist .dist-bar {
    display: flex; height: 14px; border-radius: 99px; overflow: hidden;
    background: var(--bg);
  }
  .srs-dist .dist-bar span { display: block; height: 100%; }
  .srs-dist .dist-legend {
    display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px;
    font-size: 11px; color: var(--muted); font-family: var(--mono);
  }
  .srs-dist .dist-legend span::before {
    content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 2px;
    margin-right: 4px; vertical-align: middle;
  }

  .srs-grades {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-top: 16px;
  }
  .srs-grade {
    border: 1px solid var(--line); background: var(--card);
    padding: 12px 6px; border-radius: 10px; cursor: pointer;
    font: inherit; color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: all .12s; text-align: center;
  }
  .srs-grade:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow); }
  .srs-grade .label { font-size: 13px; font-weight: 600; }
  .srs-grade .preview { font-size: 11px; color: var(--dim); font-family: var(--mono); }
  .srs-grade .kbd { font-size: 9px; color: var(--dim); margin-top: 2px;
    background: var(--bg-soft); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); }
  .srs-grade.again { border-color: var(--bad); color: var(--bad); }
  .srs-grade.again:hover:not(:disabled) { background: var(--bad-soft); }
  .srs-grade.hard  { border-color: #F08C00; color: #D9480F; }
  .srs-grade.hard:hover:not(:disabled) { background: #FFF4E6; }
  .srs-grade.good  { border-color: var(--ok); color: var(--ok); }
  .srs-grade.good:hover:not(:disabled) { background: var(--ok-soft); }
  .srs-grade.easy  { border-color: var(--accent); color: var(--accent); }
  .srs-grade.easy:hover:not(:disabled) { background: var(--accent-soft); }
  .srs-grade:disabled { opacity: .5; cursor: not-allowed; }

  .srs-card-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--dim); font-family: var(--mono);
    margin-top: 10px; padding: 0 4px;
  }
  .srs-level {
    display: inline-flex; gap: 2px; align-items: center;
  }
  .srs-level-pip {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--line);
  }
  .srs-level-pip.on { background: var(--brand); }

  .srs-counter {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--brand-soft); color: var(--cat-accent, var(--brand));
    padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600;
    font-family: var(--mono);
  }
  .srs-counter.zero { background: var(--bg-soft); color: var(--dim); }

  /* ---------- empty / loading ---------- */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--dim);
  }
  .empty .icon { font-size: 36px; margin-bottom: 12px; opacity: .5; }

  /* ---------- settings panel ---------- */
  .settings {
    position: fixed; top: 100px; right: 20px; width: 280px;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow-lg); z-index: 100;
    display: none;
  }
  .settings.open { display: block; }
  .settings h3 { margin: 0 0 12px; font-size: 13px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .settings label { display: block; font-size: 13px; margin-bottom: 4px; color: var(--muted); }
  .settings .row { margin-bottom: 14px; }
  .settings select, .settings input[type=range] {
    width: 100%; padding: 6px 8px; font: inherit; font-size: 13px;
    border: 1px solid var(--line); border-radius: 8px; background: var(--bg); color: var(--text);
  }
  .settings .row.toggle { display: flex; justify-content: space-between; align-items: center; }
  .settings .stat-line { font-size: 12px; color: var(--dim); margin-top: 8px; font-family: var(--mono); }

  /* keyboard hint */
  kbd {
    font-family: var(--mono); font-size: 11px;
    background: var(--bg-soft); border: 1px solid var(--line);
    padding: 1px 6px; border-radius: 4px;
  }

  @media (max-width: 640px) {
    .head-inner { padding: 10px 14px; }
    main { padding: 16px 14px 80px; }
    .nav-row { gap: 8px; }
    .tab-group button { padding: 5px 9px; font-size: 12px; }
    .tab-group button .count { font-size: 10px; padding: 0 5px; }
    .search-wrap { min-width: 0; }
    .flashcard { padding: 32px 20px; min-height: 240px; }
    .flashcard .english { font-size: 28px; }
    .flashcard .korean { font-size: 18px; }
    .quiz-q .en { font-size: 24px; }
    .settings { right: 8px; left: 8px; width: auto; }
  }

  @media print {
    header.app-head, .nav-row, .card-tools, .flash-controls, .settings { display: none !important; }
    .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<header class="app-head">
  <div class="head-inner">
    <div class="title-row">
      <h1 class="brand"><span class="dot"></span>영단어 마스터 <span style="font-weight:400;color:var(--dim);font-size:13px;margin-left:6px">수능 · 토익 · 공무원 · 내신</span></h1>
      <div class="progress-mini" title="전체 학습 진도">
        <span class="srs-counter zero" id="srs-counter" title="오늘 복습할 카드">🧠 0</span>

d.", "ex_ko": "그 새 단어를 찾아봐라."}, {"num": 42, "en": "make friends", "ko": "친구를 사귀다", "ex_en": "Make friends easily.", "ex_ko": "친구를 쉽게 사귀어라."}, {"num": 43, "en": "on foot", "ko": "걸어서", "ex_en": "I go to school on foot.", "ex_ko": "나는 걸어서 학교에 간다."}, {"num": 44, "en": "on time", "ko": "제시간에", "ex_en": "Arrive on time.", "ex_ko": "제시간에 도착해라."}, {"num": 45, "en": "plenty of", "ko": "많은", "ex_en": "Plenty of food remains.", "ex_ko": "음식이 많이 남아 있다."}, {"num": 46, "en": "take care of", "ko": "돌보다", "ex_en": "Take care of yourself.", "ex_ko": "너 자신을 잘 돌봐라."}, {"num": 47, "en": "take part in", "ko": "~에 참여하다", "ex_en": "Take part in the club.", "ex_ko": "그 동아리에 참여해라."}, {"num": 48, "en": "thanks to", "ko": "~덕분에", "ex_en": "Thanks to mom, I'm here.", "ex_ko": "엄마 덕분에 나는 여기 있다."}, {"num": 49, "en": "used to", "ko": "~하곤 했다", "ex_en": "I used to play piano.", "ex_ko": "나는 피아노를 치곤 했다."}, {"num": 50, "en": "wait for", "ko": "~을 기다리다", "ex_en": "Wait for me, please.", "ex_ko": "나를 기다려 줘."}]}}</script>
<script>
(() => {
'use strict';

const DATA = JSON.parse(document.getElementById('vocab-data').textContent);
const CATS = ['수능', '토익', '공무원', '내신'];
const CAT_CLASS = { '수능': 'cat-suneung', '토익': 'cat-toeic', '공무원': 'cat-gongmuwon', '내신': 'cat-naesin' };
const DAY = 86400000;

// ---------- per-category color themes ----------
function applyTheme(cat) {
  document.body.classList.remove('cat-suneung','cat-toeic','cat-gongmuwon','cat-naesin');
  document.body.classList.add(CAT_CLASS[cat]);
}

// ---------- state ----------
const state = {
  cat: localStorage.getItem('vm:cat') || '수능',
  kind: localStorage.getItem('vm:kind') || 'all',
  mode: localStorage.getItem('vm:mode') || 'list',
  filter: 'all',
  q: '',
  flashIdx: 0,
  flashShowBack: false,
  quiz: null,
  rate: parseFloat(localStorage.getItem('vm:rate') || '0.9'),
  voice: localStorage.getItem('vm:voice') || '',
  autoSpeak: localStorage.getItem('vm:autoSpeak') !== '0',
  darkAuto: localStorage.getItem('vm:darkAuto') === '1',
  newPerDay: parseInt(localStorage.getItem('vm:newPerDay') || '10', 10),
  srsSession: null,  // active review session
};
const known = JSON.parse(localStorage.getItem('vm:known') || '{}');
// known shape: { "수능|words|0": true, ... }

function knownKey(cat, kind, idx) { return `${cat}|${kind}|${idx}`; }
function isKnown(cat, kind, idx) { return !!known[knownKey(cat, kind, idx)]; }
function setKnown(cat, kind, idx, v) {
  const k = knownKey(cat, kind, idx);
  if (v) known[k] = true; else delete known[k];
  localStorage.setItem('vm:known', JSON.stringify(known));
  updateProgress();
}

// ---------- speech ----------
let voices = [];
function loadVoices() {
  voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const sel = document.getElementById('voice-sel');
  if (!sel) return;
  const en = voices.filter(v => v.lang.toLowerCase().startsWith('en'));
  sel.innerHTML = en.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
  if (state.voice && en.find(v => v.name === state.voice)) sel.value = state.voice;
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = state.rate;
  const v = voices.find(v => v.name === state.voice);
  if (v) u.voice = v;
  else {
    const fallback = voices.find(v => v.lang.toLowerCase().startsWith('en'));
    if (fallback) u.voice = fallback;
  }
  window.speechSynthesis.speak(u);
}

// ---------- SRS (SM-2 simplified) ----------
const SRS = JSON.parse(localStorage.getItem('vm:srs') || '{}');
// SRS shape: { "수능|words|0": { ease, interval, due, reviews, lapses, level } }
function srsKey(cat, kind, idx) { return `${cat}|${kind}|${idx}`; }
function getCard(key) {
  return SRS[key] || { ease: 2.5, interval: 0, due: 0, reviews: 0, lapses: 0, level: 0 };
}
function saveCard(key, st) {
  SRS[key] = st;
  localStorage.setItem('vm:srs', JSON.stringify(SRS));
}
function todayStamp() {
  const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
}
function newCountToday() {
  const day = localStorage.getItem('vm:newDay');
  if (day !== String(todayStamp())) return 0;
  return parseInt(localStorage.getItem('vm:newDone') || '0', 10);
}
function bumpNewToday() {
  localStorage.setItem('vm:newDay', String(todayStamp()));
  localStorage.setItem('vm:newDone', String(newCountToday() + 1));
}
function newLeftToday() { return Math.max(0, state.newPerDay - newCountToday()); }

// Compute next interval given current card state and grade
function nextInterval(st, grade) {
  if (grade === 'again') return 1 / (24 * 60); // ~1 min in days
  if (st.interval === 0) {
    if (grade === 'hard') return 1;
    if (grade === 'good') return 1;
    if (grade === 'easy') return 4;
  }
  if (grade === 'hard') return Math.max(1, st.interval * 1.2);
  if (grade === 'good') return st.interval * st.ease;
  if (grade === 'easy') return st.interval * st.ease * 1.3;
  return st.interval;
}
function gradeCard(key, grade) {
  const st = { ...getCard(key) };
  st.reviews++;
  const interval = nextInterval(st, grade);
  if (grade === 'again') {
    st.ease = Math.max(1.3, st.ease - 0.2);
    st.lapses++;
    st.level = Math.max(0, st.level - 1);
  } else if (grade === 'hard') {
    st.ease = Math.max(1.3, st.ease - 0.15);
  } else if (grade === 'easy') {
    st.ease = Math.min(3.5, st.ease + 0.15);
    st.level = Math.min(5, st.level + 2);
  } else if (grade === 'good') {
    st.level = Math.min(5, st.level + 1);
  }
  st.interval = interval;
  st.due = Date.now() + interval * DAY;
  saveCard(key, st);
  // mirror to known map when level reaches 3+
  if (st.level >= 3) setKnownSilent(...key.split('|').slice(0,2), parseInt(key.split('|')[2]), true);
}
function setKnownSilent(cat, kind, idx, v) {
  const k = knownKey(cat, kind, idx);
  if (v) known[k] = true; else delete known[k];
  localStorage.setItem('vm:known', JSON.stringify(known));
}
function formatInterval(days) {
  if (days < 1/24) return Math.round(days * 24 * 60) + '분';
  if (days < 1) return Math.round(days * 24) + '시간';
  if (days < 30) return Math.round(days) + '일';
  if (days < 365) return (days / 30).toFixed(1) + '개월';
  return (days / 365).toFixed(1) + '년';
}

// Aggregate due/new across one category
function srsSummary(cat) {
  const now = Date.now();
  let due = 0, learning = 0, mature = 0, neu = 0, total = 0;
  for (const k of ['words', 'idioms']) {
    DATA[cat][k].forEach((_, i) => {
      total++;
      const key = srsKey(cat, k, i);
      const st = SRS[key];
      if (!st) { neu++; return; }
      if (st.due <= now) due++;
      if (st.interval >= 21) mature++;
      else learning++;
    });
  }
  return { due, learning, mature, new: neu, total };
}
function srsSummaryAll() {
  let due = 0;
  for (const c of CATS) due += srsSummary(c).due;
  return { due };
}

// Build a review session for the current category
function buildSrsSession() {
  const cat = state.cat;
  const now = Date.now();
  const all = entriesFor(cat, 'all');
  const dueItems = [];
  const newItems = [];
  for (const e of all) {
    const key = srsKey(cat, e._kind, e._idx);
    const st = SRS[key];
    if (st) { if (st.due <= now) dueItems.push({ ...e, _key: key, isNew: false }); }
    else newItems.push({ ...e, _key: key, isNew: true });
  }
  // shuffle each pool independently
  shuffle(dueItems);
  shuffle(newItems);
  const newSlots = Math.min(newItems.length, newLeftToday());
  const queue = [...dueItems, ...newItems.slice(0, newSlots)];
  // gentle interleave: alternate due/new
  return {
    queue,
    cursor: 0,
    showBack: false,
    stats: { reviewed: 0, again: 0, hard: 0, good: 0, easy: 0, total: queue.length },
    cat,
  };
}

// ---------- data access ----------
function entriesFor(cat, kind) {
  if (kind === 'all') {
    return [
      ...DATA[cat].words.map((r, i) => ({...r, _kind: 'words', _idx: i})),
      ...DATA[cat].idioms.map((r, i) => ({...r, _kind: 'idioms', _idx: i})),
    ];
  }
  return DATA[cat][kind].map((r, i) => ({...r, _kind: kind, _idx: i}));
}

function filtered() {
  const all = entriesFor(state.cat, state.kind);
  const q = state.q.trim().toLowerCase();
  return all.filter(e => {
    if (state.filter === 'unknown' && isKnown(state.cat, e._kind, e._idx)) return false;
    if (!q) return true;
    return e.en.toLowerCase().includes(q) || e.ko.includes(q) || (e.ex_en && e.ex_en.toLowerCase().includes(q));
  });
}

// ---------- render: list ----------
function renderList() {
  const items = filtered();
  if (!items.length) {
    return `<div class="empty"><div class="icon">🔍</div>일치하는 항목이 없습니다.</div>`;
  }
  return `<div class="grid">${items.map(e => {
    const k = isKnown(state.cat, e._kind, e._idx);
    return `<div class="card ${k ? 'known' : ''}" data-kind="${e._kind}" data-idx="${e._idx}">
      <span class="card-num mono">#${e.num}·${e._kind === 'idioms' ? '숙어' : '단어'}</span>
      <div class="card-head">
        <div>
          <div class="en">${escapeHtml(e.en)}</div>
          <div class="ko">${escapeHtml(e.ko)}</div>
        </div>
      </div>
      <div class="ex">
        <div class="en">${escapeHtml(e.ex_en)}</div>
        <div class="ko">${escapeHtml(e.ex_ko)}</div>
      </div>
      <div class="card-tools">
        <button class="chip speak" data-act="speak" data-text="${escapeAttr(e.en)}">🔊 단어</button>
        <button class="chip speak" data-act="speak" data-text="${escapeAttr(e.ex_en)}">🔊 예문</button>
        <button class="chip ${k ? 'active' : ''}" data-act="known">${k ? '✓ 외움' : '외움 표시'}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ---------- render: flashcard ----------
function renderFlash() {
  const items = filtered();
  if (!items.length) {
    return `<div class="empty"><div class="icon">🎉</div>이 조건으로 표시할 카드가 없습니다.</div>`;
  }
  if (state.flashIdx >= items.length) state.flashIdx = 0;
  const e = items[state.flashIdx];
  const k = isKnown(state.cat, e._kind, e._idx);
  const pct = ((state.flashIdx + 1) / items.length * 100).toFixed(0);
  return `<div class="flash-wrap">
    <div class="flash-meta"><span class="mono">${state.flashIdx + 1} / ${items.length}</span> · ${state.cat} · ${e._kind === 'idioms' ? '숙어' : '단어'} #${e.num}</div>
    <div class="flash-progress"><span style="width:${pct}%"></span></div>
    <div class="flashcard ${k ? 'known' : ''}" id="flashcard">
      <div class="english">${escapeHtml(e.en)}</div>
      ${state.flashShowBack ? `
        <div class="korean">${escapeHtml(e.ko)}</div>
        <div class="example">
          <span class="en">${escapeHtml(e.ex_en)}</span>
          <span class="ko">${escapeHtml(e.ex_ko)}</span>
        </div>
      ` : `<div class="hint">눌러서 뒤집기 · <kbd>Space</kbd></div>`}
    </div>
    <div class="flash-controls">
      <button class="btn" data-act="flash-prev" title="이전">← 이전</button>
      <button class="btn" data-act="flash-speak" title="발음">🔊 발음</button>
      <button class="btn ${k ? '' : 'ok'}" data-act="flash-known">${k ? '✓ 외운 단어' : '외움 표시'}</button>
      <button class="btn primary" data-act="flash-next" title="다음">다음 →</button>
    </div>
    <div class="flash-meta" style="margin-top:12px">
      <kbd>←</kbd>/<kbd>→</kbd> 이동 · <kbd>Space</kbd> 뒤집기 · <kbd>P</kbd> 발음 · <kbd>K</kbd> 외움
    </div>
  </div>`;
}

function flashStep(d) {
  const items = filtered();
  if (!items.length) return;
  state.flashIdx = (state.flashIdx + d + items.length) % items.length;
  state.flashShowBack = false;
  render();
  if (state.autoSpeak) {
    const e = items[state.flashIdx];
    setTimeout(() => speak(e.en), 100);
  }
}

// ---------- render: quiz ----------
function buildQuiz() {
  const pool = entriesFor(state.cat, state.kind);
  if (pool.length < 4) return null;
  const n = Math.min(10, pool.length);
  const picked = shuffle(pool.slice()).slice(0, n);
  return {
    questions: picked.map(item => {
      const distractors = shuffle(pool.filter(p => p.en !== item.en)).slice(0, 3);
      const choices = shuffle([item, ...distractors]);
      return { item, choices, picked: null };
    }),
    idx: 0,
    done: false,
  };
}

function renderQuiz() {
  if (!state.quiz) state.quiz = buildQuiz();
  if (!state.quiz) {
    return `<div class="empty"><div class="icon">📝</div>이 카테고리는 퀴즈를 만들 항목이 부족합니다.</div>`;
  }
  const q = state.quiz;
  if (q.done) {
    const right = q.questions.filter(x => x.picked && x.picked.en === x.item.en).length;
    const total = q.questions.length;
    const wrong = q.questions.filter(x => !x.picked || x.picked.en !== x.item.en);
    return `<div class="quiz-wrap"><div class="quiz-card">
      <div class="quiz-result">
        <div class="score-big">${right} / ${total}</div>
        <div class="label">${right === total ? '🏆 완벽!' : right >= total * 0.7 ? '👍 잘했어요' : '💪 더 연습해요'}</div>
        <button class="btn primary" data-act="quiz-restart" style="margin-top:24px">다시 풀기</button>
      </div>
      ${wrong.length ? `<div class="quiz-review">
        <h3>틀린 문제</h3>
        ${wrong.map(x => `<div class="review-item">
          <span><span class="en">${escapeHtml(x.item.en)}</span> — <span class="ko">${escapeHtml(x.item.ko)}</span></span>
          <span class="wrong-mark">${x.picked ? '선택: ' + escapeHtml(x.picked.ko) : '미답'}</span>
        </div>`).join('')}
      </div>` : ''}
    </div></div>`;
  }

  const cur = q.questions[q.idx];
  const answered = cur.picked !== null;
  const score = q.questions.filter(x => x.picked && x.picked.en === x.item.en).length;
  return `<div class="quiz-wrap"><div class="quiz-card">
    <div class="quiz-meta">
      <span>문제 ${q.idx + 1} / ${q.questions.length}</span>
      <span class="score">점수 ${score}</span>
    </div>
    <div class="quiz-q">
      <div class="prompt">다음 영단어의 뜻은?</div>
      <div class="en">
        <span>${escapeHtml(cur.item.en)}</span>
        <button class="icon-btn" data-act="quiz-speak" title="발음">🔊</button>
      </div>
    </div>
    <div class="quiz-choices">
      ${cur.choices.map((c, i) => {
        let cls = 'quiz-choice';
        if (answered) {
          if (c.en === cur.item.en) cls += ' correct';
          else if (cur.picked && cur.picked.en === c.en) cls += ' wrong';
        }
        return `<button class="${cls}" data-act="quiz-pick" data-i="${i}" ${answered ? 'disabled' : ''}>
          <span class="key">${'ABCD'[i]}</span>
          <span>${escapeHtml(c.ko)}</span>
        </button>`;
      }).join('')}
    </div>
    ${answered ? `<div class="quiz-feedback">
      ${cur.picked.en === cur.item.en ? '✅ 정답!' : '❌ 오답.'}
      <strong>${escapeHtml(cur.item.en)}</strong> — <span style="color:var(--accent)">${escapeHtml(cur.item.ko)}</span>
      <div style="font-size:12px;color:var(--dim);margin-top:4px">${escapeHtml(cur.item.ex_en)}<br>${escapeHtml(cur.item.ex_ko)}</div>
      <button class="btn primary" data-act="quiz-next" style="margin-top:12px">${q.idx + 1 < q.questions.length ? '다음 문제 →' : '결과 보기'}</button>
    </div>` : ''}
  </div></div>`;
}

// ---------- render: SRS ----------
function renderSRS() {
  const sess = state.srsSession;
  const summary = srsSummary(state.cat);

  // distribution bar
  const dist = (() => {
    const total = summary.total;
    const seg = (n, color, label) => n > 0
      ? `<span style="width:${(n/total*100).toFixed(1)}%;background:${color}" title="${label}: ${n}"></span>` : '';
    return `<div class="dist-bar">
      ${seg(summary.new, 'var(--accent)', '신규')}
      ${seg(summary.learning, 'var(--brand)', '학습 중')}
      ${seg(summary.mature, 'var(--ok)', '정착')}
    </div>
    <div class="dist-legend">
      <span style="--c:var(--accent)"><i style="background:var(--accent)"></i>신규 ${summary.new}</span>
      <span><i style="background:var(--brand)"></i>학습 중 ${summary.learning}</span>
      <span><i style="background:var(--ok)"></i>정착 ${summary.mature}</span>
    </div>`.replace(/<i style="([^"]+)"><\/i>/g, '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle;$1"></span>');
  })();

  if (!sess) {
    const dueNow = summary.due;
    const newAvail = Math.min(summary.new, newLeftToday());
    const canStart = dueNow > 0 || newAvail > 0;
    return `<div class="srs-wrap">
      <div class="srs-start">
        <h2>${state.cat} SRS 복습</h2>
        <div class="sub">망각곡선(SM-2) 기반 간격 반복 학습</div>
        <div class="srs-stats">
          <div class="stat due"><div class="num">${dueNow}</div><div class="label">복습</div></div>
          <div class="stat new"><div class="num">${newAvail}</div><div class="label">신규</div></div>
          <div class="stat done"><div class="num">${summary.mature}</div><div class="label">정착</div></div>
        </div>
        <div class="srs-dist"><div class="dist-title">${state.cat} 학습 분포 (총 ${summary.total}장)</div>${dist}</div>
        <div style="margin-top:24px">
          ${canStart
            ? `<button class="btn primary" data-act="srs-start" style="padding:12px 28px;font-size:15px">▶ 복습 시작 (${dueNow + newAvail}장)</button>`
            : `<div class="empty" style="padding:32px 0"><div class="icon">🎉</div>오늘 ${state.cat} 복습은 모두 끝났어요!<br><span style="font-size:12px">${newLeftToday() === 0 && summary.new > 0 ? '내일 다시 신규 카드가 열립니다.' : ''}</span></div>`
          }
        </div>
        <div style="margin-top:16px;font-size:12px;color:var(--dim)">오늘 신규 한도: ${newCountToday()} / ${state.newPerDay}</div>
      </div>
    </div>`;
  }

  // active session
  if (sess.cursor >= sess.queue.length) {
    const s = sess.stats;
    return `<div class="srs-wrap"><div class="quiz-card">
      <div class="quiz-result">
        <div class="score-big">${s.reviewed}</div>
        <div class="label">${state.cat} 카드 복습 완료</div>
        <div class="srs-stats" style="margin-top:24px">
          <div class="stat" style="--bg:#FFE3E3"><div class="num" style="color:var(--bad)">${s.again}</div><div class="label">다시</div></div>
          <div class="stat"><div class="num" style="color:#D9480F">${s.hard}</div><div class="label">어려움</div></div>
          <div class="stat done"><div class="num">${s.good + s.easy}</div><div class="label">좋음+쉬움</div></div>
        </div>
        <div style="margin-top:24px">
          <button class="btn primary" data-act="srs-restart">새 세션</button>
          <button class="btn" data-act="srs-finish">마치기</button>
        </div>
      </div>
    </div></div>`;
  }

  const item = sess.queue[sess.cursor];
  const card = getCard(item._key);
  const pct = ((sess.cursor) / sess.queue.length * 100).toFixed(0);
  const pips = Array.from({length: 5}, (_, i) =>
    `<span class="srs-level-pip ${i < card.level ? 'on' : ''}"></span>`).join('');

  return `<div class="srs-wrap">
    <div class="srs-card-meta">
      <span>${sess.cursor + 1} / ${sess.queue.length} · ${item.isNew ? '🆕 신규' : '🔄 복습'} · ${item._kind === 'idioms' ? '숙어' : '단어'} #${item.num}</span>
      <span class="srs-level" title="레벨 ${card.level}/5">${pips}</span>
    </div>
    <div class="flash-progress" style="margin:4px 0 8px"><span style="width:${pct}%"></span></div>
    <div class="flashcard ${card.level >= 3 ? 'known' : ''}" id="srscard">
      <div class="english">${escapeHtml(item.en)}</div>
      ${sess.showBack ? `
        <div class="korean">${escapeHtml(item.ko)}</div>
        <div class="example">
          <span class="en">${escapeHtml(item.ex_en)}</span>
          <span class="ko">${escapeHtml(item.ex_ko)}</span>
        </div>
      ` : `<div class="hint">눌러서 뒤집기 · <kbd>Space</kbd></div>`}
    </div>
    ${sess.showBack ? `
      <div class="srs-grades">
        <button class="srs-grade again" data-act="srs-grade" data-grade="again">
          <span class="label">다시</span>
          <span class="preview">${formatInterval(nextInterval(card, 'again'))}</span>
          <span class="kbd">1</span>
        </button>
        <button class="srs-grade hard" data-act="srs-grade" data-grade="hard">
          <span class="label">어려움</span>
          <span class="preview">${formatInterval(nextInterval(card, 'hard'))}</span>
          <span class="kbd">2</span>
        </button>
        <button class="srs-grade good" data-act="srs-grade" data-grade="good">
          <span class="label">좋음</span>
          <span class="preview">${formatInterval(nextInterval(card, 'good'))}</span>
          <span class="kbd">3</span>
        </button>
        <button class="srs-grade easy" data-act="srs-grade" data-grade="easy">
          <span class="label">쉬움</span>
          <span class="preview">${formatInterval(nextInterval(card, 'easy'))}</span>
          <span class="kbd">4</span>
        </button>
      </div>
      <div class="srs-card-meta">
        <span>현재 간격: ${formatInterval(card.interval || 0)} · ease ${card.ease.toFixed(2)} · 복습 ${card.reviews}회</span>
        <button class="chip speak" data-act="srs-speak">🔊 발음</button>
      </div>
    ` : `
      <div class="flash-controls">
        <button class="btn primary" data-act="srs-reveal">정답 보기 <kbd>Space</kbd></button>
        <button class="btn" data-act="srs-speak">🔊 발음 <kbd>P</kbd></button>
      </div>
    `}
  </div>`;
}

// ---------- progress ----------
function updateProgress() {
  let total = 0, done = 0;
  for (const c of CATS) {
    for (const k of ['words', 'idioms']) {
      const n = DATA[c][k].length;
      total += n;
      for (let i = 0; i < n; i++) if (isKnown(c, k, i)) done++;
    }
    const ent = entriesFor(c, 'all');
    const knownCount = ent.filter(e => isKnown(c, e._kind, e._idx)).length;
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = `${knownCount}/${ent.length}`;
  }
  document.getElementById('progress-num').textContent = `${done} / ${total}`;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  const stats = document.getElementById('settings-stats');
  if (stats) stats.textContent = `학습: ${done} · 전체: ${total} · ${(done/total*100).toFixed(1)}%`;
  const srsBadge = document.getElementById('srs-counter');
  if (srsBadge) {
    const all = srsSummaryAll();
    srsBadge.textContent = `🧠 ${all.due}`;
    srsBadge.classList.toggle('zero', all.due === 0);
    srsBadge.title = `오늘 복습할 카드 ${all.due}개`;
  }
}

// ---------- main render ----------
function render() {
  const app = document.getElementById('app');
  if (state.mode === 'list') app.innerHTML = renderList();
  else if (state.mode === 'flash') app.innerHTML = renderFlash();
  else if (state.mode === 'srs') app.innerHTML = renderSRS();
  else if (state.mode === 'quiz') app.innerHTML = renderQuiz();
  // sync tab actives
  document.querySelectorAll('#cat-tabs button').forEach(b => b.classList.toggle('active', b.dataset.cat === state.cat));
  document.querySelectorAll('#kind-tabs button').forEach(b => b.classList.toggle('active', b.dataset.kind === state.kind));
  document.querySelectorAll('#mode-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  document.querySelectorAll('#filter-tabs button').forEach(b => b.classList.toggle('active', b.dataset.filter === state.filter));
}

// ---------- utils ----------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; } return a; }

// ---------- event handlers ----------
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-act], [data-cat], [data-kind], [data-mode], [data-filter]');
  if (!t) return;
  if (t.dataset.cat) {
    state.cat = t.dataset.cat; localStorage.setItem('vm:cat', state.cat);
    state.flashIdx = 0; state.flashShowBack = false; state.quiz = null; state.srsSession = null;
    applyTheme(state.cat); render(); return;
  }
  if (t.dataset.kind) { state.kind = t.dataset.kind; localStorage.setItem('vm:kind', state.kind); state.flashIdx = 0; state.flashShowBack = false; state.quiz = null; render(); return; }
  if (t.dataset.mode) {
    state.mode = t.dataset.mode; localStorage.setItem('vm:mode', state.mode);
    state.flashShowBack = false;
    if (state.mode === 'quiz') state.quiz = null;
    if (state.mode === 'srs') state.srsSession = null;
    render(); return;
  }
  if (t.dataset.filter) { state.filter = t.dataset.filter; state.flashIdx = 0; render(); return; }
  const act = t.dataset.act;
  if (act === 'speak') { speak(t.dataset.text); return; }
  if (act === 'known') {
    const card = t.closest('.card');
    const kind = card.dataset.kind, idx = +card.dataset.idx;
    setKnown(state.cat, kind, idx, !isKnown(state.cat, kind, idx));
    render(); return;
  }
  if (act === 'flash-prev') { flashStep(-1); return; }
  if (act === 'flash-next') { flashStep(1); return; }
  if (act === 'flash-speak') {
    const items = filtered(); if (items.length) speak(items[state.flashIdx].en); return;
  }
  if (act === 'flash-known') {
    const items = filtered(); if (!items.length) return;
    const e = items[state.flashIdx];
    setKnown(state.cat, e._kind, e._idx, !isKnown(state.cat, e._kind, e._idx));
    render(); return;
  }
  if (act === 'quiz-pick') {
    const q = state.quiz, cur = q.questions[q.idx];
    cur.picked = cur.choices[+t.dataset.i];
    render(); return;
  }
  if (act === 'quiz-next') {
    const q = state.quiz;
    if (q.idx + 1 >= q.questions.length) q.done = true; else q.idx++;
    render(); return;
  }
  if (act === 'quiz-restart') { state.quiz = buildQuiz(); render(); return; }
  if (act === 'quiz-speak') {
    const q = state.quiz; if (q && !q.done) speak(q.questions[q.idx].item.en); return;
  }
  // ----- SRS handlers -----
  if (act === 'srs-start') {
    state.srsSession = buildSrsSession();
    if (state.srsSession && state.srsSession.queue.length && state.autoSpeak) {
      setTimeout(() => speak(state.srsSession.queue[0].en), 100);
    }
    render(); return;
  }
  if (act === 'srs-reveal') {
    if (!state.srsSession) return;
    state.srsSession.showBack = true; render(); return;
  }
  if (act === 'srs-speak') {
    const s = state.srsSession; if (!s || s.cursor >= s.queue.length) return;
    speak(s.queue[s.cursor].en); return;
  }
  if (act === 'srs-grade') {
    const s = state.srsSession; if (!s) return;
    const item = s.queue[s.cursor];
    const grade = t.dataset.grade;
    const wasNew = item.isNew;
    gradeCard(item._key, grade);
    if (wasNew) bumpNewToday();
    s.stats[grade]++; s.stats.reviewed++;
    // "again" → re-queue at end for in-session re-review
    if (grade === 'again') {
      s.queue.push({ ...item, isNew: false });
    }
    s.cursor++; s.showBack = false;
    updateProgress();
    render();
    if (state.autoSpeak && s.cursor < s.queue.length) {
      setTimeout(() => speak(s.queue[s.cursor].en), 100);
    }
    return;
  }
  if (act === 'srs-restart') { state.srsSession = buildSrsSession(); render(); return; }
  if (act === 'srs-finish')  { state.srsSession = null; render(); return; }
});

// Flashcard click to flip
document.addEventListener('click', (ev) => {
  const fc = ev.target.closest('#flashcard');
  if (fc && !ev.target.closest('button, kbd')) {
    state.flashShowBack = !state.flashShowBack; render(); return;
  }
  const sc = ev.target.closest('#srscard');
  if (sc && !ev.target.closest('button, kbd')) {
    if (state.srsSession) { state.srsSession.showBack = !state.srsSession.showBack; render(); }
  }
});

// Keyboard shortcuts (flashcard mode)
document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT') return;
  if (state.mode === 'flash') {
    if (ev.key === 'ArrowLeft') { ev.preventDefault(); flashStep(-1); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); flashStep(1); }
    else if (ev.key === ' ') {
      ev.preventDefault(); state.flashShowBack = !state.flashShowBack; render();
    }
    else if (ev.key === 'p' || ev.key === 'P') {
      const items = filtered(); if (items.length) speak(items[state.flashIdx].en);
    }
    else if (ev.key === 'k' || ev.key === 'K') {
      const items = filtered(); if (!items.length) return;
      const e = items[state.flashIdx];
      setKnown(state.cat, e._kind, e._idx, !isKnown(state.cat, e._kind, e._idx));
      render();
    }
    return;
  }
  if (state.mode === 'srs' && state.srsSession) {
    const s = state.srsSession;
    if (s.cursor >= s.queue.length) return;
    if (!s.showBack) {
      if (ev.key === ' ') { ev.preventDefault(); s.showBack = true; render(); }
      else if (ev.key === 'p' || ev.key === 'P') speak(s.queue[s.cursor].en);
    } else {
      const map = {'1':'again','2':'hard','3':'good','4':'easy'};
      if (map[ev.key]) {
        const grade = map[ev.key];
        const item = s.queue[s.cursor];
        const wasNew = item.isNew;
        gradeCard(item._key, grade);
        if (wasNew) bumpNewToday();
        s.stats[grade]++; s.stats.reviewed++;
        if (grade === 'again') s.queue.push({ ...item, isNew: false });
        s.cursor++; s.showBack = false;
        updateProgress(); render();
        if (state.autoSpeak && s.cursor < s.queue.length) {
          setTimeout(() => speak(s.queue[s.cursor].en), 100);
        }
      } else if (ev.key === 'p' || ev.key === 'P') speak(s.queue[s.cursor].en);
    }
  }
});

// Search
document.getElementById('search').addEventListener('input', (ev) => {
  state.q = ev.target.value; state.flashIdx = 0; render();
});

// Settings panel
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.toggle('open');
});
document.getElementById('rate').addEventListener('input', (ev) => {
  state.rate = parseFloat(ev.target.value);
  document.getElementById('rate-val').textContent = state.rate.toFixed(2);
  localStorage.setItem('vm:rate', state.rate);
});
document.getElementById('voice-sel').addEventListener('change', (ev) => {
  state.voice = ev.target.value; localStorage.setItem('vm:voice', state.voice);
});
document.getElementById('auto-speak').addEventListener('change', (ev) => {
  state.autoSpeak = ev.target.checked;
  localStorage.setItem('vm:autoSpeak', state.autoSpeak ? '1' : '0');
});
document.getElementById('dark-auto').addEventListener('change', (ev) => {
  state.darkAuto = ev.target.checked;
  document.documentElement.classList.toggle('auto', state.darkAuto);
  localStorage.setItem('vm:darkAuto', state.darkAuto ? '1' : '0');
});
document.getElementById('reset-known').addEventListener('click', () => {
  if (!confirm('"외움" 표시를 모두 초기화할까요?')) return;
  for (const k of Object.keys(known)) delete known[k];
  localStorage.removeItem('vm:known');
  updateProgress(); render();
});
document.getElementById('reset-srs').addEventListener('click', () => {
  if (!confirm('SRS 일정을 모두 초기화할까요? (외움 표시는 유지)')) return;
  for (const k of Object.keys(SRS)) delete SRS[k];
  localStorage.removeItem('vm:srs');
  localStorage.removeItem('vm:newDay');
  localStorage.removeItem('vm:newDone');
  state.srsSession = null;
  updateProgress(); render();
});
document.getElementById('new-day').addEventListener('input', (ev) => {
  state.newPerDay = parseInt(ev.target.value, 10);
  document.getElementById('new-day-val').textContent = state.newPerDay;
  localStorage.setItem('vm:newPerDay', String(state.newPerDay));
});

// ---------- init ----------
document.documentElement.classList.toggle('auto', state.darkAuto);
document.getElementById('rate').value = state.rate;
document.getElementById('rate-val').textContent = state.rate.toFixed(2);
document.getElementById('auto-speak').checked = state.autoSpeak;
document.getElementById('dark-auto').checked = state.darkAuto;
document.getElementById('new-day').value = state.newPerDay;
document.getElementById('new-day-val').textContent = state.newPerDay;
applyTheme(state.cat);
updateProgress();
render();

})();
</script>
</body>
