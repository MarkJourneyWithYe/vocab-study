<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험별 필수 어휘 학습기</title>
<meta name="description" content="수능·토익·공무원·내신 각 100단어 + 50숙어, 총 600개">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2;
    --card: #FFFFFF;
    --ink: #1F2328;
    --muted: #656D76;
    --line: #E6E4DF;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --radius: 14px;
    --accent: #1F6FEB;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
  header.top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 18px;
  }
  .title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .title .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
    transition: background .25s, box-shadow .25s;
  }
  .stats { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .stats b { color: var(--ink); font-weight: 700; }

  .tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    background: var(--card); padding: 8px;
    border-radius: 12px; border: 1px solid var(--line); margin-bottom: 14px;
  }
  .tab {
    flex: 1; min-width: 90px; padding: 10px 14px;
    border: none; border-radius: 8px; background: transparent;
    font-family: inherit; font-size: 14px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab:hover { background: var(--bg); color: var(--ink); }
  .tab.active { color: #fff; background: var(--accent); }
  .tab .count { font-size: 11px; opacity: .85; font-weight: 500; }

  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center;
  }
  .seg {
    display: inline-flex; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; padding: 4px;
  }
  .seg button {
    border: none; background: transparent; padding: 7px 14px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-radius: 7px; transition: all .15s;
  }
  .seg button.on { background: var(--ink); color: #fff; }
  .search {
    flex: 1; min-width: 180px; padding: 9px 14px;
    border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); font-family: inherit; font-size: 14px;
    color: var(--ink); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
  }
  .voice {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px 12px 4px 10px; font-size: 13px;
  }
  .voice label { color: var(--muted); }
  .voice input[type=range] { width: 90px; }

  .subbar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
    align-items: center; font-size: 13px;
  }
  .subbar label { color: var(--muted); margin-right: 4px; }
  .subbar select, .subbar input[type=number], .subbar input[type=text] {
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); font-family: inherit; font-size: 13px;
    color: var(--ink); outline: none;
  }
  .subbar input[type=number] { width: 70px; }
  .subbar input[type=text] { min-width: 130px; }
  .subbar .ck { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }

  .panel {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }

  /* LIST */
  .list { display: flex; flex-direction: column; }
  .row {
    display: grid;
    grid-template-columns: 44px 1.1fr 1fr 1.6fr 110px;
    gap: 14px; padding: 12px 16px;
    align-items: center; border-top: 1px solid var(--line); transition: background .15s;
  }
  .row:first-child { border-top: none; }
  .row:hover { background: #FCFBF8; }
  .row.head {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    background: #FAF8F3; padding: 10px 16px; border-top: none;
  }
  .row .no { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 13px; text-align: right; }
  .row .eng { font-weight: 700; font-size: 15px; }
  .row .kor { font-size: 14px; color: var(--ink); }
  .row .ex { font-size: 13px; color: #4B5563; font-style: italic; line-height: 1.5; }
  .row .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .iconbtn {
    width: 32px; height: 32px;
    border: 1px solid var(--line); background: var(--card);
    border-radius: 8px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted); transition: all .15s; padding: 0;
  }
  .iconbtn:hover { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, white); }
  .iconbtn.known { background: #DCFCE7; border-color: #86EFAC; color: #166534; }
  .iconbtn.star.on { color: #D97706; border-color: #FBBF24; background: #FEF3C7; }
  .iconbtn svg { width: 16px; height: 16px; }
  .row.hidden { display: none; }
  .row.known { background: #F0FDF4; }
  .row.known:hover { background: #DCFCE7; }

  /* FLASHCARD */
  .flash-wrap { padding: 32px 24px 24px; display: flex; flex-direction: column; align-items: center; min-height: 480px; }
  .flash-counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 18px; }
  .flashcard { width: 100%; max-width: 560px; aspect-ratio: 4 / 2.6; perspective: 1200px; cursor: pointer; }
  .flash-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1); }
  .flash-inner.flipped { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 18px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; padding: 28px; text-align: center;
    border: 2px solid var(--line); background: #FFFFFF;
  }
  .flash-front { background: linear-gradient(160deg, #FFFFFF, #FAF8F3); }
  .flash-back  { transform: rotateY(180deg); background: linear-gradient(160deg, #FFFFFF, #F4F7FB); }
  .flash-eng { font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
  .flash-hint { font-size: 12px; color: var(--muted); }
  .flash-kor { font-size: clamp(22px, 4vw, 32px); font-weight: 700; margin-bottom: 16px; }
  .flash-ex { font-size: 15px; color: #4B5563; font-style: italic; max-width: 480px; line-height: 1.55; }
  .flash-nav { display: flex; gap: 12px; margin-top: 22px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .navbtn {
    padding: 10px 18px; border: 1px solid var(--line);
    background: var(--card); border-radius: 10px; font-family: inherit;
    font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer;
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .navbtn:hover { border-color: var(--accent); color: var(--accent); }
  .navbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .navbtn.primary:hover { color: #fff; opacity: .9; }
  .navbtn.success { background: #16A34A; border-color: #16A34A; color: #fff; }
  .navbtn svg { width: 14px; height: 14px; }

  /* QUIZ */
  .quiz-wrap { padding: 28px 24px; display: flex; flex-direction: column; align-items: center; min-height: 480px; }
  .quiz-bar { width: 100%; max-width: 600px; display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 12px; font-variant-numeric: tabular-nums; }
  .quiz-progress { width: 100%; max-width: 600px; height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
  .quiz-progress > div { height: 100%; background: var(--accent); transition: width .35s ease, background .25s; }
  .quiz-question { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .quiz-prompt { font-size: clamp(26px, 4.5vw, 38px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 26px; display: flex; align-items: center; gap: 12px; text-align: center; flex-wrap: wrap; justify-content: center; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 600px; }
  .quiz-opt {
    padding: 14px 16px; background: var(--card);
    border: 1.5px solid var(--line); border-radius: 12px;
    cursor: pointer; font-family: inherit; font-size: 15px; text-align: left;
    transition: all .15s; line-height: 1.4;
    display: flex; align-items: center; gap: 10px;
  }
  .quiz-opt .lbl {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bg); color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .quiz-opt:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, white); }
  .quiz-opt.correct { background: #DCFCE7; border-color: #16A34A; color: #14532D; }
  .quiz-opt.correct .lbl { background: #16A34A; color: #fff; }
  .quiz-opt.wrong { background: #FEE2E2; border-color: #DC2626; color: #7F1D1D; }
  .quiz-opt.wrong .lbl { background: #DC2626; color: #fff; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback { margin-top: 20px; min-height: 24px; font-size: 14px; color: var(--muted); max-width: 600px; width: 100%; text-align: center; font-style: italic; }
  .quiz-feedback b { font-style: normal; color: var(--ink); }

  /* TYPING */
  .type-wrap { padding: 32px 24px; display: flex; flex-direction: column; align-items: center; min-height: 480px; }
  .type-card { background: linear-gradient(160deg, #FFFFFF, #FAF8F3); border: 2px solid var(--line); border-radius: 18px; padding: 28px 24px; width: 100%; max-width: 560px; text-align: center; }
  .type-prompt { font-size: clamp(24px, 4.5vw, 36px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--ink); }
  .type-prompt.audio { font-size: 16px; color: var(--muted); font-weight: 600; }
  .type-input {
    width: 100%; max-width: 460px; margin: 16px auto 8px;
    padding: 14px 18px; font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 20px; text-align: center;
    border: 2px solid var(--line); border-radius: 12px;
    background: #FFFFFF; outline: none; color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  .type-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
  .type-input.correct { border-color: #16A34A; background: #F0FDF4; }
  .type-input.wrong   { border-color: #DC2626; background: #FEF2F2; }
  .type-feedback { margin-top: 14px; min-height: 60px; font-size: 14px; color: var(--muted); line-height: 1.55; }
  .type-feedback .ans { font-weight: 800; color: var(--ink); font-size: 18px; }
  .type-feedback .ex { font-style: italic; display: block; margin-top: 4px; color: #4B5563; }
  .type-feedback.ok { color: #166534; }
  .type-feedback.bad { color: #991B1B; }

  /* PRINT SHEET */
  .print-wrap { padding: 0; }
  .print-preview {
    padding: 0; background: #EFEDE8;
    max-height: 78vh; overflow-y: auto;
  }

  /* A4 sheet — print-perfect layout */
  .sheet {
    background: #FFFFFF;
    margin: 18px auto;
    padding: 22mm 18mm 18mm;
    width: 210mm;
    min-height: 297mm;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    color: #111;
    font-size: 11pt;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    position: relative;
    display: flex; flex-direction: column;
  }
  .sheet-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 14px;
  }
  .sheet-head .h-title {
    font-size: 17pt; font-weight: 800; letter-spacing: -0.02em; margin: 0;
  }
  .sheet-head .h-sub {
    font-size: 9.5pt; color: #555; margin-top: 4px; font-weight: 500;
  }
  .sheet-head .h-brand {
    font-size: 9pt; color: #666; text-align: right;
  }
  .meta-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 6px 14px; margin-bottom: 18px; font-size: 10pt;
  }
  .meta-cell { display: flex; align-items: baseline; gap: 6px; }
  .meta-cell b { color: #333; font-weight: 700; white-space: nowrap; }
  .meta-cell u {
    flex: 1; min-width: 40px;
    border-bottom: 1px solid #444; text-decoration: none; min-height: 14px;
    display: inline-block;
  }

  .qtable { width: 100%; border-collapse: collapse; }
  .qtable td {
    padding: 9px 6px; border-bottom: 1px dashed #BBB; vertical-align: top;
  }
  .qtable td.no { width: 30px; color: #555; text-align: right; padding-right: 10px; font-weight: 600; }
  .qtable td.q { font-weight: 600; }
  .qtable td.q .ex-mini { font-size: 8.5pt; color: #777; font-style: italic; display: block; margin-top: 3px; font-weight: 400; }
  .qtable td.blank { width: 38%; min-width: 110px; }
  .qtable td.blank .line {
    display: inline-block; min-width: 100%; min-height: 18px;
    border-bottom: 1px solid #333;
  }
  .qtable.two-col {
    display: grid; grid-template-columns: 1fr 1fr; column-gap: 22px;
  }
  .qtable.two-col tbody { display: contents; }
  .qtable.two-col tr {
    display: grid; grid-template-columns: 26px 1fr 38%;
    border-bottom: 1px dashed #BBB; padding: 6px 0;
  }
  .qtable.two-col td { border-bottom: none; padding: 2px 4px; }

  .choice-q {
    margin-bottom: 14px; padding: 8px 0; border-bottom: 1px dotted #DDD;
  }
  .choice-q .head { font-weight: 700; margin-bottom: 6px; font-size: 11pt; }
  .choice-q .head .num { color: #555; margin-right: 6px; }
  .choice-q .opts {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
    padding-left: 22px; font-size: 10.5pt;
  }
  .choice-q .opts span b { font-weight: 700; margin-right: 4px; color: #555; }

  .sheet-foot {
    margin-top: auto; padding-top: 12px; border-top: 1px solid #DDD;
    display: flex; justify-content: space-between; font-size: 8.5pt; color: #888;
  }
  .sheet.answers .sheet-head { border-color: #B91C1C; }
  .sheet.answers .h-title { color: #B91C1C; }
  .ans-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); column-gap: 24px;
  }
  .ans-grid table { width: 100%; border-collapse: collapse; }
  .ans-grid td { padding: 5px 6px; border-bottom: 1px dotted #DDD; font-size: 10pt; vertical-align: top; }
  .ans-grid td.no { width: 28px; color: #888; text-align: right; padding-right: 8px; }
  .ans-grid td.q { color: #333; }
  .ans-grid td.a { color: #B91C1C; font-weight: 700; }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }

  @media (max-width: 720px) {
    .row { grid-template-columns: 32px 1fr 92px; }
    .row .kor { grid-column: 2; }
    .row .ex { display: none; }
    .row.head .ex { display: none; }
    .row.head { grid-template-columns: 32px 1fr 92px; }
    .quiz-options { grid-template-columns: 1fr; }
    .voice { display: none; }
    .sheet { width: 100%; padding: 14mm 10mm; }
    .meta-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media print {
    @page { size: A4; margin: 12mm 12mm 14mm; }
    body { background: #fff; }
    .app > header, .tabs, .toolbar, .subbar, .print-controls { display: none !important; }
    .panel { border: none; box-shadow: none; }
    .print-preview { max-height: none; overflow: visible; padding: 0; background: #fff; }
    .sheet {
      box-shadow: none; margin: 0; padding: 0;
      width: 100%; min-height: auto;
      page-break-after: always;
    }
    .sheet:last-child { page-break-after: auto; }
    .qtable td { padding: 7px 4px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="title"><span class="dot" id="accentDot"></span><span>시험별 필수 어휘 학습기</span></div>
    <div class="stats" id="stats">—</div>
  </header>

  <div class="tabs" id="examTabs"></div>

  <div class="toolbar">
    <div class="seg" id="kindSeg"></div>
    <div class="seg" id="modeSeg">
      <button data-mode="list" class="on">목록</button>
      <button data-mode="flash">플래시카드</button>
      <button data-mode="quiz">퀴즈</button>
      <button data-mode="typing">받아쓰기</button>
      <button data-mode="print">시험지</button>
    </div>
    <input id="search" class="search" type="search" placeholder="단어/뜻 검색…" autocomplete="off">
    <div class="voice">
      <label>속도</label>
      <input id="rate" type="range" min="0.5" max="1.5" step="0.05" value="0.95">
    </div>
  </div>

  <div id="subbar"></div>

  <main class="panel" id="panel"></main>
</div>

  prev:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>',
  next:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>',
  shuffle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>',
  print:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>',
};

const GROUPS = SITE.groups;
const GROUP_BY_KEY = Object.fromEntries(GROUPS.map(g => [g.key, g]));
function setsOf(gkey) { return GROUP_BY_KEY[gkey].sets; }
function setObj(gkey, skey) { return setsOf(gkey).find(s => s.key === skey) || setsOf(gkey)[0]; }
function setLabel(gkey, skey) { return (setObj(gkey, skey) || {}).label || skey; }

const state = {
  exam: localStorage.getItem('exam') || GROUPS[0].key,
  kind: localStorage.getItem('kind') || GROUPS[0].sets[0].key,
  mode: localStorage.getItem('mode') || 'list',
  search: '',
  rate: parseFloat(localStorage.getItem('rate') || '0.95'),

  flashIdx: 0, flashFlipped: false,

  quizDir: localStorage.getItem('quizDir') || 'en2ko',
  quizIdx: 0, quizScore: 0, quizPool: [], quizCurrent: null, quizAnswered: false,

  typeSub: localStorage.getItem('typeSub') || 'meaning',
  typeIdx: 0, typeScore: 0, typePool: [], typeAnswered: false,

  // Print
  printCount: parseInt(localStorage.getItem('printCount') || '25'),
  printDir: localStorage.getItem('printDir') || 'en2ko',
  printFormat: localStorage.getItem('printFormat') || 'blank', // blank | choice4
  printCols: parseInt(localStorage.getItem('printCols') || '1'),
  printWithAnswers: localStorage.getItem('printWithAnswers') !== '0',
  printWithExample: localStorage.getItem('printWithExample') !== '0',
  printSchool: localStorage.getItem('printSchool') || '',
  printTitle: localStorage.getItem('printTitle') || '',
  printSeed: 0,
};

// Validate exam/kind from localStorage
if (!GROUP_BY_KEY[state.exam]) state.exam = GROUPS[0].key;
if (!setObj(state.exam, state.kind)) state.kind = setsOf(state.exam)[0].key;

const itemKey = (exam, kind, eng) => `${exam}.${kind}.${eng}`;
const status = JSON.parse(localStorage.getItem('vocab_status') || '{}');
const starred = JSON.parse(localStorage.getItem('vocab_starred') || '{}');
function saveStatus() { localStorage.setItem('vocab_status', JSON.stringify(status)); }
function saveStarred() { localStorage.setItem('vocab_starred', JSON.stringify(starred)); }

// TTS
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice() {
  if (!voices.length) return null;
  const en = voices.filter(v => v.lang.startsWith('en'));
  if (!en.length) return null;
  const us = en.find(v => v.lang === 'en-US' && /female|samantha|google us english|jenny|aria/i.test(v.name));
  if (us) return us;
  return en.find(v => v.lang === 'en-US') || en[0];
}
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice(); if (v) u.voice = v;
  u.lang = 'en-US'; u.rate = state.rate; u.pitch = 1.0;
  speechSynthesis.speak(u);
}

function currentItems() {
  const s = setObj(state.exam, state.kind);
  return s.items.map(x => ({ eng: x[0], kor: x[1], ex: x[2] || '' }));
}
function filtered() {
  const q = state.search.trim().toLowerCase();
  if (!q) return currentItems();
  return currentItems().filter(i =>
    i.eng.toLowerCase().includes(q) || i.kor.toLowerCase().includes(q)
  );
}
function setAccent() {
  document.documentElement.style.setProperty('--accent', GROUP_BY_KEY[state.exam].color);
}
function updateStats() {
  const items = currentItems(); const total = items.length;
  const knownCount = items.filter(i => status[itemKey(state.exam, state.kind, i.eng)] === 'known').length;
  const pct = total ? Math.round(knownCount / total * 100) : 0;
  document.getElementById('stats').innerHTML =
    `<b>${GROUP_BY_KEY[state.exam].label}</b> ${setLabel(state.exam, state.kind)} · 외움 <b>${knownCount}</b>/${total} (${pct}%)`;
}

function renderTabs() {
  const tabs = document.getElementById('examTabs'); tabs.innerHTML = '';
  GROUPS.forEach(g => {
    const totalItems = g.sets.reduce((sum, s) => sum + s.items.length, 0);
    const btn = document.createElement('button');
    btn.className = 'tab' + (g.key === state.exam ? ' active' : '');
    btn.innerHTML = `${g.label}<span class="count">${totalItems}</span>`;
    if (g.key === state.exam) btn.style.background = g.color;
    btn.onclick = () => {
      state.exam = g.key; localStorage.setItem('exam', state.exam);
      // Ensure kind still valid
      if (!setObj(state.exam, state.kind)) state.kind = setsOf(state.exam)[0].key;
      localStorage.setItem('kind', state.kind);
      resetModeStates(); render();
    };
    tabs.appendChild(btn);
  });
}
function resetModeStates() {
  state.flashIdx = 0; state.flashFlipped = false;
  state.quizIdx = 0; state.quizScore = 0; state.quizPool = []; state.quizCurrent = null;
  state.typeIdx = 0; state.typeScore = 0; state.typePool = []; state.typeAnswered = false;
}
function renderToolbar() {
  // Kind segmented control — dynamic per group
  const kindSeg = document.getElementById('kindSeg'); kindSeg.innerHTML = '';
  const sets = setsOf(state.exam);
  if (sets.length <= 1) {
    kindSeg.style.display = 'none';
  } else {
    kindSeg.style.display = '';
    sets.forEach(s => {
      const b = document.createElement('button');
      b.dataset.kind = s.key;
      b.textContent = s.label;
      if (s.key === state.kind) b.classList.add('on');
      b.onclick = () => {
        state.kind = s.key; localStorage.setItem('kind', s.key);
        resetModeStates(); render();
      };
      kindSeg.appendChild(b);
    });

  document.querySelectorAll('#modeSeg button').forEach(b => {
    b.classList.toggle('on', b.dataset.mode === state.mode);
    b.onclick = () => {
      state.mode = b.dataset.mode; localStorage.setItem('mode', state.mode);
      if (state.mode === 'quiz')   initQuiz();
      if (state.mode === 'typing') initType();
      render();
    };
  });
  const s = document.getElementById('search');
  s.value = state.search;
  s.oninput = (e) => { state.search = e.target.value; renderPanel(); };
  const rate = document.getElementById('rate');
  rate.value = state.rate;
  rate.oninput = (e) => { state.rate = parseFloat(e.target.value); localStorage.setItem('rate', state.rate); };
}

      </div>
      <label>방향</label>
      <div class="seg" id="prDirSeg">
        <button data-dir="en2ko" class="${state.printDir==='en2ko'?'on':''}">영→한</button>

}

function renderPanel() {
  const p = document.getElementById('panel');
  if (state.mode === 'list')   p.innerHTML = listHTML();

  if (state.mode === 'quiz')   p.innerHTML = quizHTML();
  if (state.mode === 'typing') p.innerHTML = typeHTML();
  if (state.mode === 'print')  p.innerHTML = printHTML();

  updateStats();
}

function listHTML() {
  const items = filtered();
  if (!items.length) return '<div class="empty">검색 결과가 없습니다.</div>';
  let html = `<div class="list">
    <div class="row head">
      <div class="no">#</div><div>English</div><div>Korean</div>

  items.forEach((it, i) => {

    html += `<div class="row ${isKnown ? 'known' : ''}" data-eng="${escAttr(it.eng)}">

// QUIZ
function initQuiz() {
  state.quizPool = shuffle(currentItems().slice());
  state.quizIdx = 0; state.quizScore = 0;
  nextQuiz();
}
function nextQuiz() {
  if (!state.quizPool.length) { state.quizCurrent = null; return; }
  const items = currentItems();
  const target = state.quizPool[state.quizIdx];
  const distractors = shuffle(items.filter(x => x.eng !== target.eng)).slice(0, 3);
  state.quizCurrent = { target, options: shuffle([target, ...distractors]) };
  state.quizAnswered = false;
}
function quizHTML() {
  if (!state.quizPool.length) initQuiz();
  if (!state.quizCurrent) return '<div class="empty">표시할 항목이 없습니다.</div>';
  const { target, options } = state.quizCurrent;
  const total = state.quizPool.length, cur = state.quizIdx + 1;
  const pct = Math.round(((cur - 1) / total) * 100);
  const isEn2Ko = state.quizDir === 'en2ko';
  const promptText = isEn2Ko ? target.eng : target.kor;
  const questionLabel = isEn2Ko ? '다음 단어의 뜻은?' : '다음 뜻에 해당하는 영어는?';
  const speakBtn = isEn2Ko ? `<button class="iconbtn" data-act="speak" title="발음">${SVG.speaker}</button>` : '';

  let optHtml = '';
  options.forEach((o, i) => {
    const optText = isEn2Ko ? o.kor : o.eng;
    optHtml += `<button class="quiz-opt" data-eng="${escAttr(o.eng)}">
      <span class="lbl">${String.fromCharCode(65 + i)}</span><span>${escHtml(optText)}</span>
    </button>`;
  });
  return `<div class="quiz-wrap">
    <div class="quiz-bar"><span>${cur} / ${total}</span><span>점수 <b>${state.quizScore}</b></span></div>
    <div class="quiz-progress"><div style="width:${pct}%"></div></div>
    <div class="quiz-question">${questionLabel}</div>
    <div class="quiz-prompt">${escHtml(promptText)} ${speakBtn}</div>
    <div class="quiz-options">${optHtml}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>`;
}

// TYPING

function typeCurrent() { return state.typePool[state.typeIdx]; }

// PRINT SHEET
function seededShuffle(arr, seed) {
  const a = arr.slice();
  let s = seed || 0.13;
  function rnd() { s = (s * 9301 + 49297) % 233280; return s / 233280; }
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rnd() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickPrintSet() {
  const items = currentItems().slice();
  const seed = (state.printSeed || 0.13) + state.exam.length * 0.07 + (state.kind.length * 0.03);
  return seededShuffle(items, seed).slice(0, Math.min(state.printCount, items.length));
}
function printHTML() {
  const items = pickPrintSet();
  const title = state.printTitle || `${GROUP_BY_KEY[state.exam].label} ${setLabel(state.exam, state.kind)} 시험`;
  const isEn2Ko = state.printDir === 'en2ko';
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const schoolLine = state.printSchool ? `<div class="h-sub">${escHtml(state.printSchool)}</div>` : '';
  const brand = SITE.brand ? `<div class="h-brand">${escHtml(SITE.brand)}</div>` : '';

  let body = '';
  const choices = [];
  if (state.printFormat === 'choice4') {
    // For each item, pick 3 distractors from the full set
    const pool = currentItems();
    items.forEach((it, i) => {
      const distractors = seededShuffle(pool.filter(x => x.eng !== it.eng), state.printSeed + i * 0.11).slice(0, 3);
      const opts = seededShuffle([it, ...distractors], state.printSeed + i * 0.31);
      const correctIdx = opts.findIndex(o => o.eng === it.eng);
      choices.push({ q: it, opts, correctIdx });
    });
    let optBlocks = '';
    choices.forEach((c, i) => {
      const qText = isEn2Ko ? c.q.eng : c.q.kor;
      const exLine = (state.printWithExample && isEn2Ko && c.q.ex)
        ? `<div class="ex-mini" style="font-size:8.5pt;color:#777;font-style:italic;margin-top:2px;">${escHtml(c.q.ex)}</div>` : '';
      const optHtml = c.opts.map((o, j) => {
        const t = isEn2Ko ? o.kor : o.eng;
        return `<span><b>${'①②③④'[j]}</b> ${escHtml(t)}</span>`;
      }).join('');
      optBlocks += `<div class="choice-q">
        <div class="head"><span class="num">${i+1}.</span> ${escHtml(qText)}</div>
        ${exLine}
        <div class="opts">${optHtml}</div>
      </div>`;
    });
    body = optBlocks;
  } else {
    // Blank format
    let rows = '';
    items.forEach((it, i) => {
      if (isEn2Ko) {
        const exLine = state.printWithExample && it.ex ? `<span class="ex-mini">${escHtml(it.ex)}</span>` : '';
        rows += `<tr>
          <td class="no">${i+1}.</td>
          <td class="q">${escHtml(it.eng)}${exLine}</td>
          <td class="blank"><span class="line">&nbsp;</span></td>
        </tr>`;
      } else {
        rows += `<tr>
          <td class="no">${i+1}.</td>
          <td class="q">${escHtml(it.kor)}</td>
          <td class="blank"><span class="line">&nbsp;</span></td>
        </tr>`;
      }
    });
    body = `<table class="qtable ${state.printCols===2?'two-col':''}"><tbody>${rows}</tbody></table>`;
  }

  // Answer sheet
  let ansBlock = '';
  if (state.printWithAnswers) {
    if (state.printFormat === 'choice4') {
      // Split answers into 2 columns
      const half = Math.ceil(choices.length / 2);
      const renderCol = (start, end) => {
        let html = '<table>';
        for (let i = start; i < end; i++) {
          const c = choices[i];
          html += `<tr><td class="no">${i+1}.</td><td class="a">${'①②③④'[c.correctIdx]}</td><td>${escHtml(isEn2Ko ? c.q.kor : c.q.eng)}</td></tr>`;
        }
        return html + '</table>';
      };
      ansBlock = `<div class="ans-grid">${renderCol(0, half)}${renderCol(half, choices.length)}</div>`;
    } else {
      const half = Math.ceil(items.length / 2);
      const renderCol = (start, end) => {
        let html = '<table>';
        for (let i = start; i < end; i++) {
          const it = items[i];
          html += `<tr><td class="no">${i+1}.</td><td class="q">${escHtml(isEn2Ko ? it.eng : it.kor)}</td><td class="a">${escHtml(isEn2Ko ? it.kor : it.eng)}</td></tr>`;
        }
        return html + '</table>';
      };
      ansBlock = `<div class="ans-grid">${renderCol(0, half)}${renderCol(half, items.length)}</div>`;
    }
  }

  const answerSheet = state.printWithAnswers ? `
    <div class="sheet answers">
      <div class="sheet-head">
        <div>
          <h1 class="h-title">정답 — ${escHtml(title)}</h1>
          ${schoolLine}
        </div>
        ${brand}
      </div>
      <div class="meta-grid">
        <div class="meta-cell"><b>날짜</b> <u>&nbsp;${dateStr}&nbsp;</u></div>
        <div class="meta-cell"><b>총 문항</b> <u>&nbsp;${items.length}문제&nbsp;</u></div>
      </div>
      ${ansBlock}
      <div class="sheet-foot">
        <span>${escHtml(title)} — 정답</span>
        <span>2 / 2</span>
      </div>
    </div>` : '';

  return `<div class="print-wrap">
    <div class="print-preview">
      <div class="sheet">
        <div class="sheet-head">
          <div>
            <h1 class="h-title">${escHtml(title)}</h1>
            ${schoolLine}
          </div>
          ${brand}
        </div>
        <div class="meta-grid">
          <div class="meta-cell"><b>학년</b> <u></u></div>
          <div class="meta-cell"><b>반</b> <u></u></div>
          <div class="meta-cell"><b>번호</b> <u></u></div>
          <div class="meta-cell" style="grid-column: span 2;"><b>이름</b> <u></u></div>
          <div class="meta-cell"><b>점수</b> <u></u> / ${items.length}</div>
        </div>
        ${body}
        <div class="sheet-foot">
          <span>${escHtml(title)}</span>
          <span>${state.printWithAnswers ? '1 / 2' : '1 / 1'}</span>
        </div>
      </div>
      ${answerSheet}
    </div>
  </div>`;
}

function bindPanelEvents() {
  if (state.mode === 'list') {
    document.querySelectorAll('.row[data-eng]').forEach(row => {
      const eng = row.dataset.eng;
      row.querySelectorAll('[data-act]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const act = btn.dataset.act;
          if (act === 'speak') speak(eng);
          if (act === 'star') {
            const k = itemKey(state.exam, state.kind, eng);
            starred[k] = !starred[k]; saveStarred();
            btn.classList.toggle('on', !!starred[k]);
          }
          if (act === 'known') {
            const k = itemKey(state.exam, state.kind, eng);
            status[k] = status[k] === 'known' ? null : 'known';
            saveStatus(); renderPanel();
          }
        };
      });
      row.addEventListener('click', () => speak(eng));
    });
  }
  if (state.mode === 'flash') {
    const card = document.getElementById('flashcard');
    if (card) card.onclick = () => {
      state.flashFlipped = !state.flashFlipped;
      renderPanel();
      if (!state.flashFlipped) {
        const it = filtered()[Math.min(state.flashIdx, filtered().length-1)];
        if (it) speak(it.eng);
      }
    };
    document.querySelectorAll('.flash-nav [data-act]').forEach(b => {
      b.onclick = (e) => {
        e.stopPropagation();
        const items = filtered();
        const act = b.dataset.act;
        if (act === 'next') {
          state.flashIdx = (state.flashIdx + 1) % items.length;
          state.flashFlipped = false; renderPanel();
          const it = items[state.flashIdx]; if (it) setTimeout(() => speak(it.eng), 80);
        }
        if (act === 'prev') {
          state.flashIdx = (state.flashIdx - 1 + items.length) % items.length;
          state.flashFlipped = false; renderPanel();
          const it = items[state.flashIdx]; if (it) setTimeout(() => speak(it.eng), 80);
        }
        if (act === 'speak') { const it = items[state.flashIdx]; if (it) speak(it.eng); }
        if (act === 'shuffle') {
          state.flashIdx = Math.floor(Math.random() * items.length);
          state.flashFlipped = false; renderPanel();
        }
        if (act === 'known') {
          const it = items[state.flashIdx]; if (!it) return;
          const k = itemKey(state.exam, state.kind, it.eng);
          status[k] = status[k] === 'known' ? null : 'known';
          saveStatus(); renderPanel();
        }
      };
    });
  }
  if (state.mode === 'quiz') {
    if (state.quizCurrent && state.quizDir === 'en2ko') speak(state.quizCurrent.target.eng);
    document.querySelectorAll('.quiz-opt').forEach(btn => {
      btn.onclick = () => {
        if (state.quizAnswered) return;
        state.quizAnswered = true;
        const eng = btn.dataset.eng;
        const correct = state.quizCurrent.target.eng;
        const isCorrect = eng === correct;
        if (isCorrect) state.quizScore++;
        document.querySelectorAll('.quiz-opt').forEach(b => {
          b.disabled = true;
          if (b.dataset.eng === correct) b.classList.add('correct');
          else if (b === btn && !isCorrect) b.classList.add('wrong');
        });
        const t = state.quizCurrent.target;
        document.getElementById('quizFeedback').innerHTML =
          (isCorrect ? '✓ 정답! ' : '✗ 오답 — ') +
          `<b>${escHtml(t.eng)}</b>: ${escHtml(t.kor)}<br><em>${escHtml(t.ex)}</em>`;
        setTimeout(() => {
          state.quizIdx++;
          if (state.quizIdx >= state.quizPool.length) {
            document.getElementById('panel').innerHTML = resultHTML(state.quizScore, state.quizPool.length, 'initQuiz');
            return;
          }
          nextQuiz(); renderPanel();
        }, 1800);
      };
    });
    const sp = document.querySelector('.quiz-prompt [data-act="speak"]');
    if (sp) sp.onclick = () => speak(state.quizCurrent.target.eng);
  }
  if (state.mode === 'typing') {
    const it = typeCurrent();
    if (state.typeSub === 'audio' && it) speak(it.eng);
    const input = document.getElementById('typeInput');
    if (input) {
      input.focus();
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); submitType(); }
      });
    }
    const replay = document.getElementById('typeReplay');
    if (replay) replay.onclick = () => { const c = typeCurrent(); if (c) speak(c.eng); };
    document.getElementById('typeSubmit').onclick = submitType;
    document.querySelectorAll('.flash-nav [data-act="skip"]').forEach(b => {
      b.onclick = () => { advanceType(); };
    });
  }
}

function submitType() {
  if (state.typeAnswered) { advanceType(); return; }
  const input = document.getElementById('typeInput');
  const it = typeCurrent(); if (!it || !input) return;
  const guess = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
  const target = it.eng.toLowerCase().trim();
  const isCorrect = guess === target;
  state.typeAnswered = true; input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  const fb = document.getElementById('typeFb');
  fb.className = 'type-feedback ' + (isCorrect ? 'ok' : 'bad');
  fb.innerHTML = (isCorrect ? '✓ 정답!' : '✗ 오답') +
    ` &nbsp;<span class="ans">${escHtml(it.eng)}</span>` +
    (state.typeSub === 'meaning' ? '' : ` &nbsp;<span style="color:#666">${escHtml(it.kor)}</span>`) +
    `<span class="ex">"${escHtml(it.ex)}"</span>` +
    `<div style="margin-top:8px;font-size:12px;">Enter로 다음 문제</div>`;
  if (isCorrect) state.typeScore++;
  speak(it.eng);
  document.getElementById('typeSubmit').textContent = '다음 →';
}
function advanceType() {
  state.typeIdx++; state.typeAnswered = false;
  if (state.typeIdx >= state.typePool.length) {
    document.getElementById('panel').innerHTML = resultHTML(state.typeScore, state.typePool.length, 'initType');
    return;
  }
  renderPanel();
}
function resultHTML(score, total, restartFn) {
  const pct = Math.round(score/total*100);
  return `<div class="empty" style="padding:80px 20px;">
    <div style="font-size:38px;font-weight:800;margin-bottom:8px;">${score} / ${total}</div>
    <div style="margin-bottom:20px;">${pct}% 정답</div>
    <button class="navbtn primary" onclick="window.${restartFn}(); window.renderPanel();">다시 풀기</button>
  </div>`;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escAttr(s) { return escHtml(s); }

document.addEventListener('keydown', (e) => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (state.mode === 'flash') {
    if (e.key === 'ArrowRight') document.querySelector('.flash-nav [data-act="next"]')?.click();
    if (e.key === 'ArrowLeft')  document.querySelector('.flash-nav [data-act="prev"]')?.click();
    if (e.key === ' ') { e.preventDefault(); document.querySelector('.flash-nav [data-act="speak"]')?.click(); }
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('flashcard')?.click(); }
  }
});

function render() { setAccent(); renderTabs(); renderToolbar(); renderSubbar(); renderPanel(); }
window.initQuiz = initQuiz; window.initType = initType; window.renderPanel = renderPanel; window.state = state;
render();
</script>
</body>
</html>
